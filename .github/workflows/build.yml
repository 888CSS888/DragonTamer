name: Build DragonTamer Plugin

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'pom.xml'
  pull_request:
    branches: [ main, master ]
  # Возможность запустить сборку вручную из интерфейса GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Клонируем код репозитория
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Устанавливаем JDK 8 (ваш плагин под 1.12.2 использует Java 8)
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'
      
      # 3. Собираем плагин через Maven
      - name: Build with Maven
        run: mvn clean package --file pom.xml
      
      # 4. Сохраняем собранный JAR как артефакт
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: DragonTamer
          path: target/*.jar
